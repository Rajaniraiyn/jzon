name: Publish to crates.io

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish jzon-rs-derive
        run: cargo publish -p jzon-rs-derive --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for indexing
        run: sleep 60

      - name: Publish jzon-rs
        run: cargo publish -p jzon-rs --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for indexing
        run: sleep 60

      - name: Publish jzon-rs-serde
        run: cargo publish -p jzon-rs-serde --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for indexing
        run: sleep 60

      - name: Publish jzon-rs-compat
        run: cargo publish -p jzon-rs-compat --no-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
