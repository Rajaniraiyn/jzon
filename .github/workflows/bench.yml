name: bench

# Criterion bench runner. Runs bench_cmp on 5 platforms (x86_64-darwin dropped).
# Default run (no arguments): runs both stable and nightly feature configs in parallel
# on all 5 platforms, then generates BENCHMARKS.md with both current-run values
# and the existing high-water mark — published headline numbers only go up.
#
# Config A (stable):  simd,simd-intrinsics,fast-float,zmij-float-ser
# Config B (nightly): simd,simd-intrinsics,fast-float,zmij-float-ser,unstable
#
# When bench=bench_cmp and update_docs=true (default), the aggregate job:
#   - generates BENCHMARKS.md from parsed criterion output (current run + high-water)
#   - replaces <!-- bench:* --> markers in READMEs
#   - opens or updates a PR on branch bench-results/<ref>

"on":
  workflow_dispatch:
    inputs:
      bench:
        description: 'Criterion bench target (bench_cmp, bench_simd, bench_scanner, or bench_derive_dispatch)'
        type: string
        default: 'bench_cmp'
      features:
        description: 'Cargo features override for stable job (empty = use default simd,simd-intrinsics,fast-float,zmij-float-ser)'
        type: string
        default: ''
      filter:
        description: 'Criterion filter regex (empty = all)'
        type: string
        default: ''
      ref:
        description: 'Git ref to benchmark (empty = workflow ref)'
        type: string
        default: ''
      runners:
        description: 'Comma-separated subset of {x86_64-linux,aarch64-linux,aarch64-darwin,x86_64-windows,aarch64-windows} (empty = all)'
        type: string
        default: ''
      measurement_time:
        description: 'Per-bench measurement seconds'
        type: string
        default: '6'
      update_docs:
        description: 'Generate BENCHMARKS.md + README markers + open PR'
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  matrix:
    name: pick runners
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.build.outputs.include }}
    steps:
      - id: build
        shell: bash
        run: |
          # x86_64-darwin (macos-13 Intel) deliberately excluded — scarce GHA pool,
          # slow queue, results nearly identical to x86_64-linux AVX2.
          ALL='[
            {"name":"x86_64-linux",    "os":"ubuntu-latest",    "triple":"x86_64-unknown-linux-gnu"},
            {"name":"aarch64-linux",   "os":"ubuntu-24.04-arm", "triple":"aarch64-unknown-linux-gnu"},
            {"name":"aarch64-darwin",  "os":"macos-latest",     "triple":"aarch64-apple-darwin"},
            {"name":"x86_64-windows",  "os":"windows-latest",   "triple":"x86_64-pc-windows-msvc"},
            {"name":"aarch64-windows", "os":"windows-11-arm",   "triple":"aarch64-pc-windows-msvc"}
          ]'
          REQ='${{ inputs.runners }}'
          if [ -z "$REQ" ]; then
            echo "include=$(echo "$ALL" | jq -c .)" >> "$GITHUB_OUTPUT"
          else
            FILTER=$(echo "$REQ" | tr ',' '\n' | jq -R . | jq -cs .)
            FILTERED=$(echo "$ALL" | jq -c --argjson keep "$FILTER" '[.[] | select(.name as $n | $keep | index($n))]')
            echo "include=$FILTERED" >> "$GITHUB_OUTPUT"
          fi

  bench:
    needs: matrix
    name: bench / ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.include) }}
    runs-on: ${{ matrix.os }}
    env:
      BENCH: ${{ inputs.bench || 'bench_cmp' }}
      FEATURES: ${{ inputs.features || 'simd,simd-intrinsics,fast-float,zmij-float-ser' }}
      FILTER: ${{ inputs.filter }}
      MTIME: ${{ inputs.measurement_time || '6' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: bench-${{ matrix.name }}-stable

      - name: Build bench
        shell: bash
        run: |
          cargo build --release -p jzon-rs --bench "$BENCH" \
            --features "$FEATURES" --target ${{ matrix.triple }}

      - name: Run bench
        shell: bash
        run: |
          set -o pipefail
          mkdir -p out
          cargo bench -p jzon-rs --bench "$BENCH" \
            --features "$FEATURES" \
            --target ${{ matrix.triple }} \
            -- --measurement-time "$MTIME" --warm-up-time 1 ${FILTER:+"$FILTER"} \
            2>&1 | tee out/bench-${{ matrix.name }}.log

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-log-${{ matrix.name }}
          path: out/bench-${{ matrix.name }}.log
          if-no-files-found: warn
          retention-days: 30

  bench-nightly:
    needs: matrix
    name: bench-nightly / ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.include) }}
    runs-on: ${{ matrix.os }}
    env:
      BENCH: ${{ inputs.bench || 'bench_cmp' }}
      FEATURES: simd,simd-intrinsics,fast-float,zmij-float-ser,unstable
      FILTER: ${{ inputs.filter }}
      MTIME: ${{ inputs.measurement_time || '6' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          key: bench-${{ matrix.name }}-nightly

      - name: Build bench
        shell: bash
        run: |
          cargo build --release -p jzon-rs --bench "$BENCH" \
            --features "$FEATURES" --target ${{ matrix.triple }}

      - name: Run bench
        shell: bash
        run: |
          set -o pipefail
          mkdir -p out
          cargo bench -p jzon-rs --bench "$BENCH" \
            --features "$FEATURES" \
            --target ${{ matrix.triple }} \
            -- --measurement-time "$MTIME" --warm-up-time 1 ${FILTER:+"$FILTER"} \
            2>&1 | tee out/bench-${{ matrix.name }}.log

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-log-nightly-${{ matrix.name }}
          path: out/bench-${{ matrix.name }}.log
          if-no-files-found: warn
          retention-days: 30

  generate:
    name: generate docs + PR
    needs: [bench, bench-nightly]
    if: always() && inputs.update_docs != false && (inputs.bench == '' || inputs.bench == 'bench_cmp')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: bench-log-*
          path: bench-logs
          merge-multiple: false

      - name: Parse logs + generate BENCHMARKS.md + update markers
        shell: bash
        run: |
          set -euo pipefail

          # ── helpers ─────────────────────────────────────────────────────────

          # Extract median throughput for a given "group/bench" from a log file.
          # Outputs e.g. "1.22 GiB/s" or "702 MiB/s" or "" if not found.
          extract_thrpt() {
            local log="$1" pattern="$2"
            # Criterion output format:
            #   <group>/<bench>                   ← bare name line, no leading spaces
            #                   time:   [lo mid hi unit]
            #                   thrpt:  [lo mid hi unit]
            # "Benchmarking <group>/<bench>" lines appear earlier and must be skipped.
            awk -v pat="$pattern" '
              # Match lines that start with the exact pattern (name may be followed by spaces+time:)
              /^[^ ]/ && substr($0, 1, length(pat)) == pat && (length($0) == length(pat) || substr($0, length(pat)+1, 1) == " ") {
                found=1; next
              }
              found && /thrpt:/ {
                # strip to the bracket contents: "[lo mid hi unit]"
                sub(/.*\[/, ""); sub(/\].*/, "")
                # fields: lo mid hi unit  (3 numbers then unit)
                n = split($0, f, " ")
                if (n >= 4) {
                  val = f[3]+0; unit = f[4]  # format: lo unit mid unit hi unit
                  if (unit == "GiB/s") {
                    printf "%.2f GiB/s", val
                  } else if (unit == "MiB/s") {
                    if (val >= 1000) printf "%.2f GiB/s", val/1024
                    else             printf "%.0f MiB/s", val
                  } else {
                    printf "%.2f %s", val, unit
                  }
                }
                found=0; next
              }
              found && /^[^ ]/ && !/thrpt:/ { found=0 }
            ' "$log"
          }

          # Replace marker block content in-place.
          replace_marker() {
            local file="$1" key="$2" content="$3"
            python3 - "$file" "$key" "$content" <<'PYEOF'
          import sys, re, pathlib
          path, key, content = sys.argv[1], sys.argv[2], sys.argv[3]
          text = pathlib.Path(path).read_text()
          pattern = rf'<!-- bench:{re.escape(key)}-start -->.*?<!-- bench:{re.escape(key)}-end -->'
          replacement = f'<!-- bench:{key}-start -->\n{content}\n<!-- bench:{key}-end -->'
          new_text, n = re.subn(pattern, replacement, text, flags=re.DOTALL)
          if n:
            pathlib.Path(path).write_text(new_text)
          PYEOF
          }

          # Convert a display value like "1.22 GiB/s" or "702 MiB/s" to MiB/s float.
          to_mib() {
            echo "$1" | awk '{
              if ($2=="GiB/s") printf "%.4f", $1*1024
              else if ($2=="MiB/s") printf "%.4f", $1
              else print 0
            }'
          }

          # Format a MiB/s float back to display string.
          fmt_mib() {
            echo "$1" | awk '{
              v=$1+0
              if (v>=1024) printf "%.2f GiB/s", v/1024
              else printf "%.0f MiB/s", v
            }'
          }

          # Return whichever of stored/new is higher (high-water mark).
          # Both args are display strings like "1.22 GiB/s", "—", or "".
          best_val() {
            local stored="$1" new_val="$2"
            if [ -z "$new_val" ] || [ "$new_val" = "—" ]; then
              echo "${stored:-—}"
              return
            fi
            if [ -z "$stored" ] || [ "$stored" = "—" ]; then
              echo "$new_val"
              return
            fi
            local stored_mib new_mib
            stored_mib=$(to_mib "$stored")
            new_mib=$(to_mib "$new_val")
            if awk "BEGIN{exit ($new_mib > $stored_mib) ? 0 : 1}"; then
              echo "$new_val"
            else
              echo "$stored"
            fi
          }

          # ── collect logs ────────────────────────────────────────────────────

          PLATFORMS=(x86_64-linux aarch64-linux aarch64-darwin x86_64-windows aarch64-windows)
          PLATFORM_LABELS=(
            "x86_64-linux:x86_64 Linux (AVX2)"
            "aarch64-linux:aarch64 Linux (Graviton)"
            "aarch64-darwin:Apple Silicon (macOS)"
            "x86_64-windows:x86_64 Windows (AVX2)"
            "aarch64-windows:Windows on ARM"
          )

          # Workloads: "criterion_pattern:display_name"
          WORKLOADS=(
            "deserialize/twitter/jzon:twitter de"
            "serialize/twitter/jzon:twitter ser"
            "deserialize/citm_catalog/jzon/A:citm de"
            "deserialize/canada/jzon:canada de"
            "serialize/canada/jzon:canada ser"
          )

          COMPETITORS=(serde_json sonic_rs simd_json)

          # ── parse stored high-water values from existing BENCHMARKS.md ──────
          # We read the existing headline table and h2h table so that numbers
          # can only go up across runs (runner variance cannot cause regression).

          declare -A STORED  # STORED[platform:workload] = stored display value

          if [ -f BENCHMARKS.md ]; then
            # Parse headline table: columns are twitter de, twitter ser, citm de, canada ser
            # Rows look like: | Label | val | val | val | val |
            # We match stored platform labels to PLATFORM_LABELS keys.
            while IFS='|' read -r _ plabel td ts cd cs _rest; do
              plabel=$(echo "$plabel" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed 's/\*//g')
              td=$(echo "$td" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              ts=$(echo "$ts" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              cd=$(echo "$cd" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              cs=$(echo "$cs" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              [ -z "$plabel" ] && continue
              for entry in "${PLATFORM_LABELS[@]}"; do
                pkey="${entry%%:*}"
                label="${entry##*:}"
                if [ "$plabel" = "$label" ]; then
                  [ -n "$td" ] && [ "$td" != "—" ] && STORED["${pkey}:twitter de"]="$td"
                  [ -n "$ts" ] && [ "$ts" != "—" ] && STORED["${pkey}:twitter ser"]="$ts"
                  [ -n "$cd" ] && [ "$cd" != "—" ] && STORED["${pkey}:citm de"]="$cd"
                  [ -n "$cs" ] && [ "$cs" != "—" ] && STORED["${pkey}:canada ser"]="$cs"
                fi
              done
            done < <(awk '/<!-- bench:headline-start -->/,/<!-- bench:headline-end -->/' BENCHMARKS.md \
                      | grep '^\|' | grep -v '\-\-\-' | grep -v 'Platform')

            # Parse h2h table: columns are jzon, serde_json, sonic_rs, simd_json
            # Rows look like: | Label | group | jzon | serde_json | sonic_rs | simd_json |
            while IFS='|' read -r _ plabel wl jzon_v serde_v sonic_v simd_v _rest; do
              plabel=$(echo "$plabel" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed 's/\*//g')
              wl=$(echo "$wl" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              jzon_v=$(echo "$jzon_v" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              serde_v=$(echo "$serde_v" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              sonic_v=$(echo "$sonic_v" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              simd_v=$(echo "$simd_v" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
              [ -z "$plabel" ] || [ -z "$wl" ] && continue
              for entry in "${PLATFORM_LABELS[@]}"; do
                pkey="${entry%%:*}"
                label="${entry##*:}"
                if [ "$plabel" = "$label" ]; then
                  [ -n "$jzon_v"  ] && [ "$jzon_v"  != "—" ] && STORED["${pkey}:${wl}/jzon"]="$jzon_v"
                  [ -n "$serde_v" ] && [ "$serde_v" != "—" ] && STORED["${pkey}:${wl}/serde_json"]="$serde_v"
                  [ -n "$sonic_v" ] && [ "$sonic_v" != "—" ] && STORED["${pkey}:${wl}/sonic_rs"]="$sonic_v"
                  [ -n "$simd_v"  ] && [ "$simd_v"  != "—" ] && STORED["${pkey}:${wl}/simd_json"]="$simd_v"
                fi
              done
            done < <(awk '/<!-- bench:h2h-start -->/,/<!-- bench:h2h-end -->/' BENCHMARKS.md \
                      | grep '^\|' | grep -v '\-\-\-' | grep -v 'Platform')
          fi

          # ── build data arrays from this run's logs ───────────────────────────
          # We merge stable and nightly logs: for each cell, take the higher value.

          declare -A DATA     # DATA[platform:workload] = high-water output after merge
          declare -A CURRENT  # CURRENT[platform:workload] = best throughput from this workflow run only

          for platform in "${PLATFORMS[@]}"; do
            # Try both stable and nightly log directories
            for log_prefix in "bench-log-${platform}" "bench-log-nightly-${platform}"; do
              log=$(find bench-logs -path "*/${log_prefix}/bench-${platform}.log" 2>/dev/null | head -1 || true)
              [ -z "$log" ] && log=$(find bench-logs -name "bench-${platform}.log" -path "*${log_prefix}*" 2>/dev/null | head -1 || true)
              [ -f "$log" ] || continue

              for wl in "${WORKLOADS[@]}"; do
                pattern="${wl%%:*}"
                name="${wl##*:}"
                val=$(extract_thrpt "$log" "$pattern")
                if [ -n "$val" ] && [ "$val" != "—" ]; then
                  # Keep whichever is higher between this log and what we have so far
                  cur="${DATA["${platform}:${name}"]:-}"
                  DATA["${platform}:${name}"]=$(best_val "$cur" "$val")
                  # Also store under the criterion path for h2h lookup
                  case "$name" in
                    "twitter de")  DATA["${platform}:deserialize/twitter/jzon"]=$(best_val "${DATA["${platform}:deserialize/twitter/jzon"]:-}" "$val") ;;
                    "twitter ser") DATA["${platform}:serialize/twitter/jzon"]=$(best_val "${DATA["${platform}:serialize/twitter/jzon"]:-}" "$val") ;;
                    "citm de")     DATA["${platform}:deserialize/citm_catalog/jzon"]=$(best_val "${DATA["${platform}:deserialize/citm_catalog/jzon"]:-}" "$val") ;;
                    "canada ser")  DATA["${platform}:serialize/canada/jzon"]=$(best_val "${DATA["${platform}:serialize/canada/jzon"]:-}" "$val") ;;
                  esac
                fi
              done

              for comp in "${COMPETITORS[@]}"; do
                for group in "deserialize/twitter" "serialize/twitter" "deserialize/citm_catalog" "serialize/canada"; do
                  val=$(extract_thrpt "$log" "${group}/${comp}")
                  if [ -n "$val" ] && [ "$val" != "—" ]; then
                    cur="${DATA["${platform}:${group}/${comp}"]:-}"
                    DATA["${platform}:${group}/${comp}"]=$(best_val "$cur" "$val")
                  fi
                done
              done
            done
          done

          # Snapshot current-run values before merging stored high-water values.
          for key in "${!DATA[@]}"; do
            CURRENT["$key"]="${DATA[$key]}"
          done

          # ── apply high-water mark: merge with stored values ──────────────────
          # For every key that has a stored value, keep the best of stored vs new run.

          for platform in "${PLATFORMS[@]}"; do
            for wl in "${WORKLOADS[@]}"; do
              name="${wl##*:}"
              stored="${STORED["${platform}:${name}"]:-}"
              new_val="${DATA["${platform}:${name}"]:-}"
              DATA["${platform}:${name}"]=$(best_val "$stored" "$new_val")
            done
            for wl in "${WORKLOADS[@]}"; do
              # Also merge h2h jzon column paths
              case "${wl##*:}" in
                "twitter de")  k="${platform}:deserialize/twitter/jzon" ;;
                "twitter ser") k="${platform}:serialize/twitter/jzon" ;;
                "citm de")     k="${platform}:deserialize/citm_catalog/jzon" ;;
                "canada ser")  k="${platform}:serialize/canada/jzon" ;;
                *)             continue ;;
              esac
              DATA["$k"]=$(best_val "${STORED["$k"]:-}" "${DATA["$k"]:-}")
            done
            for comp in "${COMPETITORS[@]}"; do
              for group in "deserialize/twitter" "serialize/twitter" "deserialize/citm_catalog" "serialize/canada"; do
                k="${platform}:${group}/${comp}"
                DATA["$k"]=$(best_val "${STORED["$k"]:-}" "${DATA["$k"]:-}")
              done
            done
          done

          # ── generate BENCHMARKS.md ───────────────────────────────────────────

          REF="${{ inputs.ref || github.ref_name }}"
          DATE=$(date -u '+%Y-%m-%d')
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          {
            echo "# jzon-rs benchmarks"
            echo ""
            echo "Auto-generated by [bench.yml](.github/workflows/bench.yml) on every benchmark run."
            echo "Run \`gh workflow run bench.yml\` to refresh. x86_64-darwin excluded (Intel Mac GHA pool scarce)."
            echo ""
            echo "Last updated: ${DATE} · Ref: \`${REF}\` · [Run log](${RUN_URL})"
            echo ""
            echo "Criterion median throughput. GiB/s where >= 1, MiB/s otherwise. Higher is better."
            echo "High-water mark: values only increase across runs."
            echo "Current-run tables show this workflow run before high-water merging."
            echo ""
            echo "## Headline (jzon)"
            echo ""
            echo "<!-- bench:headline-start -->"
          } > BENCHMARKS.md

          # Headline table
          BEST_TD=0; BEST_TS=0; BEST_CD=0; BEST_CS=0
          declare -A BEST_ROW
          {
            printf "| Platform | twitter de | twitter ser | citm de | canada ser |\n"
            printf "|---|--:|--:|--:|--:|\n"
            for entry in "${PLATFORM_LABELS[@]}"; do
              pkey="${entry%%:*}"
              label="${entry##*:}"
              td="${DATA["${pkey}:twitter de"]:-—}"
              ts="${DATA["${pkey}:twitter ser"]:-—}"
              cd="${DATA["${pkey}:citm de"]:-—}"
              cs="${DATA["${pkey}:canada ser"]:-—}"
              # Skip all-dash rows (platform didn't run and no stored values)
              [ "$td$ts$cd$cs" = "————" ] && continue
              printf "| %-28s | %10s | %10s | %10s | %10s |\n" "$label" "$td" "$ts" "$cd" "$cs"
              # Track best per column
              for col_var in "td:BEST_TD" "ts:BEST_TS" "cd:BEST_CD" "cs:BEST_CS"; do
                col="${col_var%%:*}"; bvar="${col_var##*:}"
                val=$(eval echo "\$$col")
                [ "$val" = "—" ] && continue
                mib=$(to_mib "$val")
                cur=$(eval echo "\$$bvar")
                if awk "BEGIN{exit ($mib > $cur) ? 0 : 1}" 2>/dev/null; then
                  eval "$bvar=$mib"
                  BEST_ROW[$col]="$val"
                fi
              done
            done
            # Best row — only if we have data
            if [ -n "${BEST_ROW[td]:-}${BEST_ROW[ts]:-}${BEST_ROW[cd]:-}${BEST_ROW[cs]:-}" ]; then
              printf "| **Best across platforms** | %10s | %10s | %10s | %10s |\n" \
                "${BEST_ROW[td]:-—}" "${BEST_ROW[ts]:-—}" "${BEST_ROW[cd]:-—}" "${BEST_ROW[cs]:-—}"
            fi
          } >> BENCHMARKS.md

          echo "" >> BENCHMARKS.md
          echo "<!-- bench:headline-end -->" >> BENCHMARKS.md
          echo "" >> BENCHMARKS.md

          # Current-run headline section
          {
            echo "## Current Run (jzon)"
            echo ""
            echo "Latest workflow run only; values here are not merged with stored high-water results."
            echo ""
            echo "<!-- bench:current-run-start -->"
            printf "| Platform | twitter de | twitter ser | citm de | canada ser |\n"
            printf "|---|--:|--:|--:|--:|\n"
            for entry in "${PLATFORM_LABELS[@]}"; do
              pkey="${entry%%:*}"
              label="${entry##*:}"
              td="${CURRENT["${pkey}:twitter de"]:-—}"
              ts="${CURRENT["${pkey}:twitter ser"]:-—}"
              cd="${CURRENT["${pkey}:citm de"]:-—}"
              cs="${CURRENT["${pkey}:canada ser"]:-—}"
              [ "$td$ts$cd$cs" = "————" ] && continue
              printf "| %-28s | %10s | %10s | %10s | %10s |\n" "$label" "$td" "$ts" "$cd" "$cs"
            done
            echo ""
            echo "<!-- bench:current-run-end -->"
            echo ""
          } >> BENCHMARKS.md

          # Head-to-head section
          {
            echo "## Head-to-head vs serde_json / sonic-rs / simd-json"
            echo ""
            echo "<!-- bench:h2h-start -->"
          } >> BENCHMARKS.md

          {
            printf "| Platform | Workload | jzon | serde_json | sonic_rs | simd_json |\n"
            printf "|---|---|--:|--:|--:|--:|\n"
            for entry in "${PLATFORM_LABELS[@]}"; do
              pkey="${entry%%:*}"
              label="${entry##*:}"
              for group in "deserialize/twitter" "serialize/twitter" "deserialize/citm_catalog" "serialize/canada"; do
                jzon_val="${DATA["${pkey}:${group}/jzon"]:-—}"
                serde_val="${DATA["${pkey}:${group}/serde_json"]:-—}"
                sonic_val="${DATA["${pkey}:${group}/sonic_rs"]:-—}"
                simd_val="${DATA["${pkey}:${group}/simd_json"]:-—}"
                # Skip rows where all are dash
                [ "$jzon_val$serde_val$sonic_val$simd_val" = "————" ] && continue
                printf "| %-28s | %-30s | %10s | %10s | %10s | %10s |\n" \
                  "$label" "$group" "$jzon_val" "$serde_val" "$sonic_val" "$simd_val"
              done
            done
          } >> BENCHMARKS.md

          echo "" >> BENCHMARKS.md
          echo "<!-- bench:h2h-end -->" >> BENCHMARKS.md
          echo "" >> BENCHMARKS.md

          {
            echo "## Reproducing"
            echo ""
            echo '```bash'
            echo "gh workflow run bench.yml"
            echo '```'
            echo ""
            echo "Or with custom options:"
            echo ""
            echo '```bash'
            echo "gh workflow run bench.yml --ref main \\"
            echo "  -f bench=bench_cmp \\"
            echo "  -f measurement_time=6"
            echo '```'
          } >> BENCHMARKS.md

          echo "Generated BENCHMARKS.md"

          # ── update README markers ────────────────────────────────────────────

          HEADLINE_TABLE=$(sed -n '/<!-- bench:headline-start -->/,/<!-- bench:headline-end -->/p' BENCHMARKS.md \
            | grep -v '<!-- bench:')

          for readme in README.md crates/jzon/README.md; do
            [ -f "$readme" ] || continue
            if grep -q '<!-- bench:headline-start -->' "$readme" 2>/dev/null; then
              replace_marker "$readme" "headline" "$HEADLINE_TABLE"
              echo "Updated headline in $readme"
            fi
            # Update top-ser lede with best twitter ser across all platforms
            if grep -q '<!-- bench:top-ser-start -->' "$readme" 2>/dev/null; then
              BEST_TS_VAL="${BEST_ROW[ts]:-}"
              if [ -n "$BEST_TS_VAL" ]; then
                replace_marker "$readme" "top-ser" "Top: **${BEST_TS_VAL}** twitter serialize"
                echo "Updated top-ser in $readme"
              fi
            fi
          done

          # ── delta report ─────────────────────────────────────────────────────
          PLATFORMS_RAN="Platforms measured this run (best of stable+nightly):"$'\n'
          for entry in "${PLATFORM_LABELS[@]}"; do
            pkey="${entry%%:*}"
            label="${entry##*:}"
            val="${CURRENT["${pkey}:twitter ser"]:-}"
            [ "$val" != "—" ] && [ -n "$val" ] && PLATFORMS_RAN="${PLATFORMS_RAN}"$'\n'"- ${label}: ${val} twitter ser"
          done
          echo "$PLATFORMS_RAN" > /tmp/delta-report.md

      - name: Commit + create/update PR
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REF_SLUG="${{ inputs.ref || github.ref_name }}"
          # Sanitise for branch name
          REF_SLUG=$(echo "$REF_SLUG" | sed 's|refs/heads/||; s|[^a-zA-Z0-9._-]|-|g')
          BRANCH="bench-results/${REF_SLUG}"
          BASE_REF="${{ inputs.ref || github.ref_name }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create or reset the bench-results branch on top of the measured ref
          git checkout -B "$BRANCH"
          git add BENCHMARKS.md README.md crates/jzon/README.md 2>/dev/null || true
          git diff --cached --quiet && echo "No changes" && exit 0

          git commit -m "bench: update BENCHMARKS.md for ${BASE_REF} ($(date -u '+%Y-%m-%d'))"
          git push --force origin "$BRANCH"

          # Create or update PR
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number -q '.[0].number' || true)

          DELTA=$(cat /tmp/delta-report.md 2>/dev/null || true)
          {
            echo "Auto-generated benchmark results for \`${BASE_REF}\`."
            echo ""
            echo "Both stable (\`simd,simd-intrinsics,fast-float,zmij-float-ser\`) and nightly (\`+unstable\`) configs ran in parallel."
            echo "BENCHMARKS.md includes current-run values plus high-water values; stored headline numbers only increase, never regress due to runner variance."
            echo ""
            echo "[Run log](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"
            echo ""
            echo "${DELTA}"
            echo ""
            echo "See **Files changed** tab for the full diff vs previous numbers."
            echo ""
            echo "_Updated automatically by bench.yml. Merge to publish._"
          } > /tmp/pr-body.md

          if [ -n "$EXISTING" ]; then
            gh pr edit "$EXISTING" --body "$(cat /tmp/pr-body.md)"
            echo "Updated PR #${EXISTING}"
          else
            gh pr create \
              --head "$BRANCH" \
              --base "$BASE_REF" \
              --title "bench: update BENCHMARKS.md for ${BASE_REF}" \
              --body "$(cat /tmp/pr-body.md)"
          fi
